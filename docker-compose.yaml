# nginx proxy address - http://172.17.0.1:3000

name: typebot
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: typebot-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      NEXTAUTH_URL: http://${BASE_HOST_NAME:-$HOSTNAME}:3000
      NEXT_PUBLIC_VIEWER_URL: http://${BASE_HOST_NAME:-$HOSTNAME}:3001
      ENCRYPTION_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DATABASE_URL: postgresql://${DB_USER_NAME:-typebot}:${DB_USER_PASS:-changeme_db_password}@typebot-db:5432/${DB_CREATE_DATABASE_NAME:-typebot}
      ADMIN_EMAIL: ${APP_ADMIN_USER:-admin}@${BASE_DOMAIN_NAME:-example.com}
      SMTP_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      SMTP_PORT: ${EMAIL_SERVER_PORT:-587}
      SMTP_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      SMTP_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
      NEXT_PUBLIC_SMTP_FROM: ${EMAIL_SERVER_MAIL_FROM:-noreply@example.com}
    ports:
      - '172.17.0.1:3000:3000'
    volumes:
      - './volumes/data/typebot:/data'
    depends_on:
      typebot-db:
        condition: service_healthy
    networks:
      - typebot
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://typebot-app:3000'
      - 'cloudflare.hostname=typebot.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.typebot-app.entrypoints=http'
      - 'traefik.http.routers.typebot-app-secure.tls=true'
      - 'traefik.http.routers.typebot-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.typebot-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.typebot-app.middlewares=typebot-app-https-redirect'
      - 'traefik.http.routers.typebot-app-secure.entrypoints=https'
      - 'traefik.http.routers.typebot-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.typebot-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.typebot-app-secure.service=typebot-app'
      - 'traefik.http.services.typebot-app.loadbalancer.server.port=3000'

  viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: typebot-viewer
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      NEXTAUTH_URL: http://${BASE_HOST_NAME:-$HOSTNAME}:3001
      NEXT_PUBLIC_VIEWER_URL: http://${BASE_HOST_NAME:-$HOSTNAME}:3001
      ENCRYPTION_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DATABASE_URL: postgresql://${DB_USER_NAME:-typebot}:${DB_USER_PASS:-changeme_db_password}@typebot-db:5432/${DB_CREATE_DATABASE_NAME:-typebot}
    ports:
      - '172.17.0.1:3001:3000'
    depends_on:
      typebot-db:
        condition: service_healthy
    networks:
      - typebot
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://typebot-viewer:3000'
      - 'cloudflare.hostname=typebot.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.typebot-viewer.entrypoints=http'
      - 'traefik.http.routers.typebot-viewer-secure.tls=true'
      - 'traefik.http.routers.typebot-viewer.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.typebot-viewer-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.typebot-viewer.middlewares=typebot-viewer-https-redirect'
      - 'traefik.http.routers.typebot-viewer-secure.entrypoints=https'
      - 'traefik.http.routers.typebot-viewer-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.typebot-viewer-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.typebot-viewer-secure.service=typebot-viewer'
      - 'traefik.http.services.typebot-viewer.loadbalancer.server.port=3000'

  typebot-db:
    image: postgres:latest
    container_name: typebot-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: typebot-db
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-typebot}
      POSTGRES_USER: ${DB_USER_NAME:-typebot}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - './volumes/data/db/postgres/typebot:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - typebot

networks:
  typebot:
    name: typebot
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
